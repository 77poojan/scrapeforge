version: "3.9"

services:
  backend:
    image: pujanbade/scrapeforge-backend:latest
    container_name: scrapeforge-backend
    ports:
      - "5050:5050"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    image: pujanbade/scrapeforge-frontend:latest
    container_name: scrapeforge-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  notion-mcp:
    image: pujanbade/scrapeforge-notion-mcp:latest
    container_name: scrapeforge-notion-mcp
    env_file:
      - .env
    environment:
      - SCRAPEFORGE_BACKEND=http://backend:5050
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
